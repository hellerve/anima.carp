name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Carp
        uses: carpentry-org/setup-carp@v1

      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libsdl2-dev libcairo2-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config sdl2 cairo

      - name: Run tests
        run: |
          set -euo pipefail
          carp -x test/anima.carp

      - name: Generate docs
        run: carp -x gendocs.carp
